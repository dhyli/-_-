name: Build & Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  MODULE_NAME: redirector
  NDK_VERSION: r26c

jobs:
  build-daemon:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            ndk_triple: aarch64-linux-android
            api: 24
            out_name: daemon
          - arch: armeabi-v7a
            ndk_triple: armv7a-linux-androideabi
            api: 24
            out_name: daemon_arm

    steps:
    - uses: actions/checkout@v4

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: ${{ env.NDK_VERSION }}
        add-to-path: true

    - name: Build ${{ matrix.arch }}
      run: |
        TOOLCHAIN="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
        CC="$TOOLCHAIN/${{ matrix.ndk_triple }}${{ matrix.api }}-clang"
        if [ ! -f "$CC" ]; then
          for api in 34 33 32 31 30 29 28 26 24 21; do
            TRY="$TOOLCHAIN/${{ matrix.ndk_triple }}${api}-clang"
            [ -f "$TRY" ] && CC="$TRY" && break
          done
        fi
        echo "Compiler: $CC"
        $CC --version
        mkdir -p bin
        $CC -static -O2 -Wall -Wextra -Wno-unused-parameter \
            -o "bin/${{ matrix.out_name }}" \
            redirect_daemon.c

    - name: Strip binary
      run: |
        TOOLCHAIN="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
        STRIP="$TOOLCHAIN/llvm-strip"
        [ -f "$STRIP" ] && "$STRIP" --strip-all "bin/${{ matrix.out_name }}"

    - name: Verify binary
      run: |
        file "bin/${{ matrix.out_name }}"
        ls -lh "bin/${{ matrix.out_name }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: daemon-${{ matrix.arch }}
        path: bin/${{ matrix.out_name }}
        retention-days: 30

  package-module:
    needs: build-daemon
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Prepare binaries
      run: |
        mkdir -p bin
        cp artifacts/daemon* bin/ 2>/dev/null || true
        ls -la bin/

    - name: Generate version
      id: version
      run: |
        VER="${{ github.event.inputs.release }}"
        echo "version=$VER" >> $GITHUB_OUTPUT
        echo "模块版本: $VER"

    - name: Package module ZIP
      run: |
        VER="${{ steps.version.outputs.version }}"
        mkdir -p release
        cp -r scripts config release/ 2>/dev/null || true
        cp module.json module.prop customize.sh service.sh post-fs-data.sh uninstall.sh webui.html build.sh build.ps1 build.bat release/ 2>/dev/null || true
        cp redirect_daemon.c release/ 2>/dev/null || true
        cp -r bin release/ 2>/dev/null || true
        cd release && zip -r "../${{ env.MODULE_NAME }}-${VER}.zip" . && cd ..
        ls -lh "${{ env.MODULE_NAME }}-${VER}.zip"

    - name: Upload module artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.MODULE_NAME }}-${{ steps.version.outputs.version }}
        path: ${{ env.MODULE_NAME }}-${{ steps.version.outputs.version }}.zip
        retention-days: 90

  release:
    needs: package-module
    runs-on: ubuntu-latest
    if: always() && needs.package-module.result == 'success'

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: ${{ env.MODULE_NAME }}-${{ needs.package-module.outputs.version }}

    - uses: softprops/action-gh-release@v1
      with:
        name: "易の重定向 ${{ needs.package-module.outputs.version }}"
        body: |
          ## 易の重定向 ${{ needs.package-module.outputs.version }}
          ### 包含架构
          - arm64-v8a (daemon) — 现代 ARM64 设备
          - armeabi-v7a (daemon_arm) — 32位 ARM 设备
          ### 安装方式
          1. 下载 redirector-*.zip
          2. 通过 KernelSU / Magisk 管理器安装
          3. 重启设备
        files: |
          ${{ env.MODULE_NAME }}-${{ needs.package-module.outputs.version }}.zip
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
